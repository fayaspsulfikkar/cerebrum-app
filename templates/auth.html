<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CEREBRUM — {{ 'Sign Up' if mode == 'signup' else 'Log In' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'IBM Plex Mono',monospace;background:#000;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:2rem}
    .card{width:100%;max-width:360px}
    .logo{font-size:1.6rem;font-weight:700;letter-spacing:.25em;color:#fff;margin-bottom:.25rem}
    .logo span{color:#00e5ff}
    .tagline{font-size:.65rem;color:#444;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2.5rem}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.7rem;border:1px solid #333;border-radius:4px;background:transparent;color:#ccc;font-size:.78rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;font-family:inherit;letter-spacing:.03em}
    .google-btn:hover{border-color:#00e5ff;color:#00e5ff}
    .google-btn svg{width:16px;height:16px;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:.8rem;margin:1.5rem 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a1a1a}
    .divider span{font-size:.6rem;color:#333;text-transform:uppercase;letter-spacing:.12em}
    label{display:block;font-size:.6rem;font-weight:500;color:#444;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.1em}
    input[type=email],input[type=password]{width:100%;padding:.6rem .7rem;background:transparent;border:1px solid #222;border-radius:4px;color:#e0e0e0;font-size:.78rem;margin-bottom:1rem;outline:none;transition:border-color .15s;font-family:inherit}
    input:focus{border-color:#00e5ff}
    input::placeholder{color:#333}
    .btn{width:100%;padding:.65rem;border:1px solid #00e5ff;border-radius:4px;background:transparent;color:#00e5ff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:all .15s;margin-bottom:1.2rem}
    .btn:hover{background:#00e5ff;color:#000}
    .err{color:#ff3d71;font-size:.7rem;margin-bottom:.8rem;display:none;font-family:inherit}
    .switch{font-size:.68rem;color:#333;text-align:center}
    .switch a{color:#00e5ff;text-decoration:none}
    .switch a:hover{text-decoration:underline}
    .corner{position:fixed;font-size:.55rem;color:#1a1a1a;letter-spacing:.1em}
    .corner.tl{top:1.5rem;left:1.5rem}.corner.br{bottom:1.5rem;right:1.5rem}
  </style>
</head>
<body>
<div class="corner tl">SYS.AUTH.V2</div>
<div class="corner br">TRIBE_NEURAL_NET</div>
<div class="card">
  <div class="logo">CERE<span>B</span>RUM</div>
  <div class="tagline">Neural Engagement Analysis</div>

  <a href="/auth/google/login" class="google-btn">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </a>

  <div class="divider"><span>or use email</span></div>

  <form id="form">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" required>
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••" required minlength="6">
    <div class="err" id="err"></div>
    <button type="submit" class="btn">{{ 'CREATE ACCOUNT' if mode == 'signup' else 'LOG IN' }}</button>
  </form>

  <div class="switch">
    {% if mode == 'signup' %}
      Have an account? <a href="/login">Log in</a>
    {% else %}
      No account? <a href="/signup">Sign up</a>
    {% endif %}
  </div>
</div>
<script>
const MODE='{{ mode }}';
document.getElementById('form').onsubmit=async e=>{
  e.preventDefault();const err=document.getElementById('err');err.style.display='none';
  const email=document.getElementById('email').value,password=document.getElementById('password').value;
  try{const r=await fetch(MODE==='signup'?'/api/signup':'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const d=await r.json();if(!r.ok){err.textContent=d.error;err.style.display='block';return}
  localStorage.setItem('token',d.token);localStorage.setItem('email',d.email);window.location.href='/';
  }catch(ex){err.textContent='Network error';err.style.display='block'}
};
</script>
</body>
</html>
